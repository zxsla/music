<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典旋律 | 白嫖联盟科技空间</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --tech-bg: #020b1a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--tech-bg);
            overflow-x: hidden;
        }

        /* 科技感背景图层 - 杨幂 40px 模糊 */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(135deg, rgba(2, 11, 26, 0.85), rgba(18, 0, 36, 0.85)),
                url('https://w.wallhaven.cc/full/85/wallhaven-85m7qy.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(40px);
            z-index: -2;
            transform: scale(1.1);
        }

        /* 动态网格 */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            animation: gridMove 10s linear infinite;
        }

        @keyframes gridMove {
            from { transform: translateY(0); }
            to { transform: translateY(50px); }
        }

        /* 跑马灯 */
        .marquee {
            width: 100%;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 0;
            border-bottom: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            animation: moveText 25s linear infinite;
            color: var(--neon-blue);
            font-weight: bold;
            text-transform: uppercase;
        }

        @keyframes moveText {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 搜索框区域 */
        .search-container {
            margin-top: 80px;
            width: 90%;
            max-width: 650px;
            z-index: 10;
        }

        .search-input {
            width: 100%;
            padding: 15px 25px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid var(--neon-purple);
            border-radius: 50px;
            color: #fff;
            outline: none;
            box-shadow: 0 0 15px var(--neon-purple);
            transition: 0.3s;
        }

        .search-input:focus {
            box-shadow: 0 0 25px var(--neon-blue);
            border-color: var(--neon-blue);
        }

        .source-tags {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .tag {
            font-size: 11px;
            padding: 4px 10px;
            border: 1px solid var(--neon-blue);
            border-radius: 4px;
            color: var(--neon-blue);
            background: rgba(0, 243, 255, 0.05);
        }

        /* 主面板 */
        .glass-panel {
            margin-top: 30px;
            width: 95%;
            max-width: 850px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 35px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.6);
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 2.2rem;
            letter-spacing: 4px;
            background: linear-gradient(to right, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 播放器容器 */
        .player-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 15px;
            margin: 25px 0;
            border: 1px solid rgba(0, 243, 255, 0.2);
        }

        audio {
            width: 100%;
            height: 45px;
            filter: invert(1) hue-rotate(180deg) brightness(1.5);
        }

        /* 歌曲列表样式 */
        .song-list {
            max-height: 400px;
            overflow-y: auto;
            text-align: left;
            padding-right: 10px;
        }

        /* 自定义滚动条 */
        .song-list::-webkit-scrollbar { width: 5px; }
        .song-list::-webkit-scrollbar-thumb { background: var(--neon-blue); border-radius: 10px; }

        .song-item {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .song-item:hover {
            background: rgba(0, 243, 255, 0.15);
            transform: scale(1.02);
        }

        .song-item.active {
            border-left: 5px solid var(--neon-blue);
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-blue);
            font-weight: bold;
        }

            font-size: 10px;
            padding: 2px 6px;
            border
