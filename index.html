<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body {
            min-height: 100vh;
            color: white;
            background: #000;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        .bg-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://w.wallhaven.cc/full/85/wallhaven-85m7qy.jpg') center/cover no-repeat;
            filter: blur(38px) brightness(0.68);
            z-index: -2;
        }
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,140,255,0.25), rgba(0,220,255,0.32), rgba(180,100,255,0.22));
            z-index: -1;
        }
        .header-marquee {
            background: rgba(255,150,255,0.18);
            backdrop-filter: blur(10px);
            padding: 12px 0;
            text-align: center;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #ff9aff;
            position: sticky; top: 0; z-index: 10;
            font-size: 1rem;
        }
        .main {
            flex: 1;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-box {
            background: rgba(255,255,255,0.09);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,180,255,0.35);
            border-radius: 24px;
            padding: 30px 25px;
            text-align: center;
            max-width: 620px;
            width: 100%;
            box-shadow: 0 15px 45px rgba(255,120,255,0.25);
        }
        .title {
            font-size: 2.4rem;           /* 已缩小 */
            font-weight: bold;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #ff9aff, #00f0ff, #ff9aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 1.1rem;
            margin-bottom: 25px;
            opacity: 0.9;
        }
        /* 歌词区 */
        .lyric-container {
            height: 68px;
            background: rgba(0,0,0,0.35);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            border: 1px solid rgba(255,200,255,0.2);
        }
        #lyric-text {
            font-size: 1.05rem;
            padding: 0 20px;
            text-shadow: 0 0 8px #00f0ff;
            min-height: 1.4em;
        }
        .player-title {
            font-size: 1.25rem;
            margin: 10px 0 15px;
        }
        audio {
            width: 100%;
            margin-bottom: 20px;
        }
        .song-list {
            text-align: left;
            max-height: 240px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
        .song-item {
            padding: 13px 18px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
        }
        .song-item:hover, .song-item.active {
            background: rgba(255,150,255,0.25);
            color: #ff9aff;
        }
        .bottom {
            padding: 18px;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="bg-fixed"></div>
    <div class="bg-overlay"></div>

    <div class="header-marquee">
        Eternity · 白嫖联盟永恒音乐空间
    </div>

    <div class="main">
        <div class="glass-box">
            <div class="title">ETERNITY</div>
            <div class="subtitle">白嫖联盟 · 永恒音乐空间</div>

            <!-- 歌词区 -->
            <div class="lyric-container">
                <div id="lyric-text">♪ 愿时光温柔，愿你永恒 ♪</div>
            </div>

            <div class="player-title" id="track-name">正在载入...</div>
            <audio id="audio-player" controls></audio>

            <div class="song-list" id="list-render"></div>
        </div>
    </div>

    <div class="bottom">
        愿每一首歌，都陪你走到永恒
    </div>

    <script>
        const mySongs = [
            { name: "明年今日", url: "https://files.catbox.moe/lsees9.flac" },
            { name: "爱就爱了", url: "https://files.catbox.moe/hbet5m.mp3" },
            { name: "好好恋爱", url: "https://files.catbox.moe/t6x5cp.flac" },
            { name: "光辉岁月", url: "https://files.catbox.moe/4tx3om.flac" },
            { name: "第几次爱的人", url: "https://files.catbox.moe/o5rhh5.flac" },
            { name: "二宝子的楼兰", url: "https://files.catbox.moe/yejdad.flac" },
            { name: "富士山下", url: "https://files.catbox.moe/qgh684.flac" },
            { name: "好心好报", url: "https://files.catbox.moe/5b4cw2.flac" }
        ];

        const audio = document.getElementById('audio-player');
        const listContainer = document.getElementById('list-render');
        const trackTitle = document.getElementById('track-name');
        const lyricText = document.getElementById('lyric-text');
        let currentIdx = 0;

        const lyricsArray = [
            "♪ 愿时光温柔，愿你永恒 ♪",
            "把心收回 忘了那是谁",
            "在喧嚣世界 找一点安慰",
            "白嫖联盟 永恒相伴",
            "愿你被这个世界温柔以待"
        ];

        function renderSongs() {
            listContainer.innerHTML = '';
            mySongs.forEach((song, i) => {
                const item = document.createElement('div');
                item.className = `song-item ${i === currentIdx ? 'active' : ''}`;
                item.innerHTML = `${i+1}. ${song.name}`;
                item.onclick = () => playThis(i);
                listContainer.appendChild(item);
            });
        }

        function playThis(i) {
            currentIdx = i;
            audio.src = mySongs[i].url;
            trackTitle.innerText = mySongs[i].name;
            renderSongs();
            audio.play();
        }

        audio.onended = () => {
            currentIdx = (currentIdx + 1) % mySongs.length;
            playThis(currentIdx);
        };

        // 动态歌词
        setInterval(() => {
            if (!audio.paused) {
                const rand = Math.floor(Math.random() * lyricsArray.length);
                lyricText.style.opacity = 0;
                setTimeout(() => {
                    lyricText.innerText = lyricsArray[rand];
                    lyricText.style.opacity = 1;
                }, 300);
            }
        }, 5000);

        window.onload = () => {
            renderSongs();
            audio.src = mySongs[0].url;
            trackTitle.innerText = mySongs[0].name;
        };
    </script>
</body>
</html>
