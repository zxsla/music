<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典旋律 | 白嫖联盟天蓝空间</title>
    <style>
        :root {
            --main-blue: #00d2ff;
            --light-blue: #91eaff;
            --glass: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
            /* 杨幂背景图 - 模糊40px */
            background: linear-gradient(rgba(0,100,200,0.2), rgba(0,100,200,0.2)), 
                        url('https://w.wallhaven.cc/full/85/wallhaven-85m7qy.jpg') no-repeat center center fixed;
            background-size: cover;
            backdrop-filter: blur(40px); /* 全局模糊40px */
        }

        /* 顶部跑马灯 */
        .marquee-box {
            width: 100%;
            background: rgba(0, 210, 255, 0.3);
            backdrop-filter: blur(10px);
            padding: 12px 0;
            border-bottom: 1px solid var(--glass-border);
            position: fixed; top: 0; z-index: 100;
        }

        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 20s linear infinite;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px var(--main-blue);
        }

        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* 主面板 */
        .glass-container {
            margin-top: 100px;
            margin-bottom: 50px;
            width: 90%;
            max-width: 700px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .logo-box img {
            width: 80px; height: 80px; border-radius: 50%;
            border: 3px solid var(--main-blue);
            box-shadow: 0 0 20px var(--main-blue);
            margin-bottom: 15px;
        }

        /* 播放器与歌词区 */
        .player-area {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }

        #song-name { color: var(--main-blue); font-size: 1.4rem; font-weight: bold; margin-bottom: 10px; }

        .lyric-box {
            height: 80px;
            overflow: hidden;
            margin: 15px 0;
            font-size: 1rem;
            color: #eee;
            transition: all 0.5s;
        }

        .lyric-line {
            height: 40px; line-height: 40px;
            transition: 0.5s;
        }

        .active-lyric {
            color: #fff;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--main-blue);
        }

        audio {
            width: 100%;
            filter: invert(100%) hue-rotate(180deg) brightness(1.8);
        }

        /* 播放列表 */
        .playlist {
            text-align: left;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .playlist::-webkit-scrollbar { width: 4px; }
        .playlist::-webkit-scrollbar-thumb { background: var(--main-blue); border-radius: 10px; }

        .song-item {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex; justify-content: space-between;
            transition: 0.3s;
        }

        .song-item:hover { background: rgba(255,255,255,0.1); }
        .song-item.active {
            background: rgba(0, 210, 255, 0.2);
            border-left: 4px solid var(--main-blue);
            color: var(--main-blue);
        }

        /* 底部专栏 */
        footer {
            margin-top: auto;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px 0;
            border-top: 1px solid var(--glass-border);
        }

        .footer-grid {
            max-width: 800px; margin: 0 auto;
            display: flex; justify-content: space-between;
            padding: 0 20px; flex-wrap: wrap;
        }

        .intro-col { flex: 2; min-width: 250px; text-align: left; }
        .time-col { flex: 1; text-align: right; min-width: 150px; }

        .time-text { font-size: 1.8rem; font-weight: bold; color: var(--main-blue); }

    </style>
</head>
