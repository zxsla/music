<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body {
            min-height: 100vh;
            color: white;
            background: #000;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        .bg-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://w.wallhaven.cc/full/85/wallhaven-85m7qy.jpg') center/cover no-repeat;
            filter: blur(38px) brightness(0.68);
            z-index: -2;
        }
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,140,255,0.28), rgba(0,220,255,0.35), rgba(180,100,255,0.25));
            z-index: -1;
        }
        .header-marquee {
            background: rgba(255,150,255,0.22);
            backdrop-filter: blur(10px);
            padding: 13px 0;
            text-align: center;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #ff9aff;
            position: sticky; top: 0; z-index: 10;
            font-size: 1.02rem;
        }
        .main {
            flex: 1;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-box {
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(255,200,255,0.4);
            border-radius: 26px;
            padding: 32px 25px;
            text-align: center;
            max-width: 630px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(255,120,255,0.28);
        }
        .title {
            font-size: 2.35rem;
            font-weight: bold;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #ff9aff, #00f0ff, #ff9aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 1.12rem;
            margin-bottom: 25px;
            opacity: 0.92;
        }
        .lyric-container {
            height: 80px;
            background: rgba(0, 0, 0, 0.48);
            border: 2px solid rgba(255, 220, 255, 0.55);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            box-shadow: 0 0 18px rgba(0, 240, 255, 0.4);
        }
        #lyric-text {
            font-size: 1.18rem;
            font-weight: bold;
            padding: 0 25px;
            text-align: center;
            text-shadow: 0 0 12px #00f0ff, 0 0 25px #ff9aff;
            transition: opacity 0.5s ease;
            line-height: 1.45;
        }
        .player-title {
            font-size: 1.28rem;
            margin: 10px 0 18px;
        }
        audio {
            width: 100%;
            margin-bottom: 22px;
        }
        .song-list {
            text-align: left;
            max-height: 380px;
            overflow-y: auto;
            background: rgba(0,0,0,0.22);
            border-radius: 14px;
            border: 1px solid rgba(255,180,255,0.2);
        }
        .song-item {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
        }
        .song-item:hover, .song-item.active {
            background: rgba(255,150,255,0.28);
            color: #ff9aff;
        }
        .bottom-info {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            padding: 20px;
            text-align: center;
            border-top: 1px solid rgba(255,200,255,0.3);
        }
        #display-date {
            font-size: 1.15rem;
            margin-bottom: 6px;
            opacity: 0.95;
        }
        #display-time {
            font-size: 2.1rem;
            font-weight: bold;
            color: #00f0ff;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.7);
        }
    </style>
</head>
<body>
    <div class="bg-fixed"></div>
    <div class="bg-overlay"></div>

    <div class="header-marquee">
        Eternity · 白嫖联盟永恒音乐空间
    </div>

    <div class="main">
        <div class="glass-box">
            <div class="title">ETERNITY</div>
            <div class="subtitle">白嫖联盟 · 永恒音乐空间</div>

            <div class="lyric-container">
                <div id="lyric-text">♪ 愿时光温柔，愿你永恒 ♪</div>
            </div>

            <div class="player-title" id="track-name">正在载入歌曲...</div>
            <audio id="audio-player" controls></audio>

            <div class="song-list" id="list-render"></div>
        </div>
    </div>

    <!-- 底部时间日期 -->
    <div class="bottom-info">
        <div id="display-date"></div>
        <div id="display-time"></div>
    </div>

    <script>
        const mySongs = [
            { name: "明年今日", url: "https://files.catbox.moe/lsees9.flac" },
            { name: "爱就爱了", url: "https://files.catbox.moe/hbet5m.mp3" },
            { name: "好好恋爱", url: "https://files.catbox.moe/t6x5cp.flac" },
            { name: "光辉岁月", url: "https://files.catbox.moe/4tx3om.flac" },
            { name: "第几次爱的人", url: "https://files.catbox.moe/o5rhh5.flac" },
            { name: "二宝子的楼兰", url: "https://files.catbox.moe/yejdad.flac" },
            { name: "富士山下", url: "https://files.catbox.moe/qgh684.flac" },
            { name: "好心好报", url: "https://files.catbox.moe/5b4cw2.flac" },
            { name: "嘎嘎", url: "https://files.catbox.moe/yjarpu.flac" },
            { name: "爱如星火", url: "https://files.catbox.moe/d5bklp.flac" },
            { name: "那一年那一天", url: "https://files.catbox.moe/fawyem.flac" },
            { name: "平凡之路", url: "https://files.catbox.moe/89l1hc.flac" },
            { name: "相濡以沫", url: "https://files.catbox.moe/0oluxu.flac" },
            { name: "不会改变", url: "https://files.catbox.moe/zsgxyr.flac" },
            { name: "朋克万岁", url: "https://files.catbox.moe/k2vbz2.flac" },
            { name: "500公里", url: "https://files.catbox.moe/gjyhqw.flac" },
            { name: "罪人", url: "https://files.catbox.moe/9p209l.flac" },
            { name: "曾经的你", url: "https://files.catbox.moe/6nm44r.flac" }
        ];

        const audio = document.getElementById('audio-player');
        const listContainer = document.getElementById('list-render');
        const trackTitle = document.getElementById('track-name');
        const lyricText = document.getElementById('lyric-text');
        let currentIdx = 0;

        const lyricsArray = [
            "♪ 愿时光温柔，愿你永恒 ♪",
            "把心收回 忘了那是谁",
            "在喧嚣世界 找一点安慰",
            "白嫖联盟 永恒相伴",
            "愿你被这个世界温柔以待",
            "♡ Eternity ♡"
        ];

        function renderSongs() {
            listContainer.innerHTML = '';
            mySongs.forEach((song, i) => {
                const item = document.createElement('div');
                item.className = `song-item ${i === currentIdx ? 'active' : ''}`;
                item.innerHTML = `${i+1}. ${song.name}`;
                item.onclick = () => playThis(i);
                listContainer.appendChild(item);
            });
        }

        function playThis(i) {
            currentIdx = i;
            audio.src = mySongs[i].url;
            trackTitle.innerText = mySongs[i].name;
            renderSongs();
            audio.play().catch(() => {
                // 如果flac播放失败，尝试换成mp3
                if (mySongs[i].url.endsWith('.flac')) {
                    audio.src = mySongs[i].url.replace('.flac', '.mp3');
                    audio.play();
                }
            });
        }

        audio.onended = () => {
            currentIdx = (currentIdx + 1) % mySongs.length;
            playThis(currentIdx);
        };

        // 随机短句
        setInterval(() => {
            if (!audio.paused) {
                const rand = Math.floor(Math.random() * lyricsArray.length);
                lyricText.style.opacity = 0;
                setTimeout(() => {
                    lyricText.innerText = lyricsArray[rand];
                    lyricText.style.opacity = 1;
                }, 400);
            }
        }, 5000);

        // 实时时间日期
        function updateTime() {
            const now = new Date();
            const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const dateStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${weekDays[now.getDay()]}`;
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            
            document.getElementById('display-date').innerText = dateStr;
            document.getElementById('display-time').innerText = timeStr;
        }

        window.onload = () => {
            renderSongs();
            playThis(0);           // 自动播放第一首
            setInterval(updateTime, 1000);
            updateTime();
        };
    </script>
</body>
                </html>
