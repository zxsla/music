<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>♡ Eternity ✨</title>
    <style>
        :root {
            --main-color: #ff9aff;
            --cyan: #00f0ff;
            --glass: rgba(255, 255, 255, 0.10);
            --border: rgba(255, 180, 255, 0.35);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }

        body {
            min-height: 100vh;
            color: white;
            background: #000;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 背景 */
        .bg-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://w.wallhaven.cc/full/85/wallhaven-85m7qy.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(38px) brightness(0.62);
            z-index: -2;
            transform: scale(1.1);
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, 
                rgba(255, 140, 255, 0.28) 0%,
                rgba(0, 210, 255, 0.35) 50%,
                rgba(180, 100, 255, 0.25) 100%);
            z-index: -1;
        }

        /* 跑马灯 */
        .header-marquee {
            width: 100%;
            background: rgba(255, 150, 255, 0.25);
            backdrop-filter: blur(12px);
            padding: 13px 0;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee-run 22s linear infinite;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 12px var(--main-color);
            font-size: 1.05rem;
        }

        @keyframes marquee-run {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        .main-wrapper {
            flex: 1;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-box {
            width: 100%;
            max-width: 620px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px 25px;
            text-align: center;
            box-shadow: 0 15px 45px rgba(255, 100, 255, 0.25);
        }

        /* 新标题 Eternity */
        .eternity-title {
            font-size: 2.4rem;
            font-weight: bold;
            background: linear-gradient(90deg, #ff9aff, #00f0ff, #ff9aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(255, 150, 255, 0.6);
        }
