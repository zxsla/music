<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #000;
            color: white;
            font-family: "Microsoft YaHei", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://w.wallhaven.cc/full/85/wallhaven-85m7qy.jpg') center/cover no-repeat;
            filter: blur(35px) brightness(0.65);
            z-index: -2;
        }
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,140,255,0.3), rgba(0,220,255,0.35));
            z-index: -1;
        }
        .content {
            text-align: center;
            z-index: 1;
        }
        .title {
            font-size: 3.5rem;
            font-weight: bold;
            letter-spacing: 10px;
            background: linear-gradient(90deg, #ff9aff, #00f0ff, #ff9aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .subtitle {
            font-size: 1.2rem;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="bg"></div>
    <div class="overlay"></div>
    
    <div class="content">
        <div class="title">ETERNITY</div>
        <div class="subtitle">白嫖联盟 · 永恒音乐空间</div>
    </div>
</body>
</html>
