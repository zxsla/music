<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>白嫖联盟 | 幂动听音乐空间</title>
    <style>
        :root {
            --main-blue: #00d2ff;
            --main-purple: #9d4edd; /* 新增酷炫紫 */
            --dark-blue: #3a7bd5;
            --glass: rgba(255, 255, 255, 0.1);
            --neon-shadow: 0 0 15px rgba(157, 78, 221, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background: #000; /*兜底背景色*/
        }

        /* 背景图层：处理模糊 */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 替换为您认为最漂亮的杨幂照片链接 */
            background-image: url('https://w.wallhaven.cc/full/85/wallhaven-85m7qy.jpg'); 
            background-size: cover;
            background-position: center;
            /* 核心修改：模糊40左右 */
            filter: blur(40px) brightness(0.6); 
            transform: scale(1.1); /* 防止模糊边缘出现白边 */
            z-index: -1;
        }

        /* 顶部跑马灯 */
        .marquee-container {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .marquee-text {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 25s linear infinite;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--main-blue);
            text-shadow: 0 0 5px var(--main-blue);
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* 酷炫紫色搜索引擎 */
        .search-area {
            margin-top: 60px; /* 紧跟跑马灯 */
            width: 90%;
            max-width: 600px;
            display: flex;
            justify-content: center;
            z-index: 10;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px;
            background: rgba(20, 20, 20, 0.6);
            border: 2px solid var(--main-purple);
            border-radius: 30px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: var(--neon-shadow);
        }

        .search-input:focus {
            box-shadow: 0 0 25px var(--main-purple), inset 0 0 10px rgba(157, 78, 221, 0.5);
            background: rgba(0, 0, 0, 0.8);
        }

        .search-input::placeholder {
            color: rgba(255,255,255,0.5);
        }

        /* 主体内容 */
        .main-content {
            margin-top: 30px;
            margin-bottom: 30px;
            width: 90%;
            max-width: 800px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        .logo-area img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--main-blue);
            margin-bottom: 10px;
            box-shadow: 0 0 15px var(--main-blue);
        }

        /* 播放器样式 */
        .player-container {
            margin: 20px 0;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        #track-title {
            color: var(--main-blue);
            margin-bottom: 10px;
            text-shadow: 0 0 5px var(--main-blue);
        }

        audio {
            width: 100%;
            height: 40px;
            /* 酷炫色调 filter */
            filter: invert(100%) hue-rotate(270deg) brightness(1.2) contrast(90%);
        }

        /* 播放列表样式 */
        .playlist-container {
            margin-top: 20px;
            text-align: left;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
            padding: 10px;
        }

        .playlist-header {
            font-size: 1.1rem;
            color: var(--main-purple);
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 3px solid var(--main-purple);
            text-shadow: 0 0 5px var(--main-purple);
        }

        .playlist-item {
            padding: 12px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            color: #ccc;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .playlist-item:last-child {
            border-bottom: none;
        }

        .playlist-item:hover {
            background: rgba(157, 78, 221, 0.2);
            color: white;
            transform: translateX(5px);
        }

        .playlist-item.active {
            background: rgba(0, 210, 255, 0.2);
            color: var(--main-blue);
            font-weight: bold;
            border-left: 3px solid var(--main-blue);
        }

        .quality-tag {
            font-size: 0.7rem;
            background: #ffc107;
            color: #000;
            padding: 2px 5px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* 底部信息 */
        footer {
            margin-top: auto;
            width: 100%;
            padding: 25px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .intro-section h4 {
            color: var(--main-purple);
            margin-bottom: 8px;
        }

        .intro-section p {
            font-size: 0.85rem;
            line-height: 1.6;
            color: #bbb;
        }

        .datetime-section {
            font-size: 1.1rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            color: var(--main-blue);
            text-shadow: 0 0 5px var(--main-blue);
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .info-grid {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .datetime-section {
                align-items: center;
                margin-top: 15px;
            }
        }

    </style>
</head>
<body>

    <div class="background-container"></div>

    <div class="marquee-container">
        <div class="marquee-text">
             💜 欢迎来到白嫖联盟音乐空间 —— 这里的音乐永远免费，杨幂的颜值永不凋谢！ 🚀 
        </div>
    </div>

    <div class="search-area">
        <input type="text" id="music-search" class="search-input" placeholder="💡 输入歌名或歌手，回车搜索 (酷我接口)...">
    </div>

    <div class="main-content">
        <div class="logo-area">
            <img src="https://via.placeholder.com/80/00d2ff/ffffff?text=BP" alt="白嫖联盟">
            <h2>幂动听 · 官方无损驿站</h2>
        </div>

        <div class="player-container">
            <h3 id="track-title">二宝子的楼兰</h3>
            <audio id="main-player" controls autoplay>
                <source src="https://files.catbox.moe/yejdad.flac" type="audio/flac">
                您的浏览器不支持播放器。
            </audio>
        </div>

        <div class="playlist-container">
            <div class="playlist-header">🎵 精选无损歌单</div>
            <div id="playlist">
                </div>
        </div>
    </div>

    <footer>
        <div class="info-grid">
            <div class="intro-section">
                <h4>🌌 灵魂共鸣</h4>
                <p>
                    <strong>白嫖联盟：</strong>核心技术员。<br>
                    <strong>宣言：</strong>用最酷的天蓝色与迷幻紫，致敬最纯粹的免费精神。<br>
                    <strong>关于：</strong>不仅是杨幂的忠实颜粉，更是开源文化的坚定信徒。本站永久部署于 GitHub，只为留住那一抹自由的旋律。
                </p>
            </div>
            <div class="datetime-section">
                <div id="date">YYYY年MM月DD日</div>
                <div id="time" style="font-weight: bold; font-size: 1.6rem;">00:00:00</div>
            </div>
        </div>
    </footer>

    <script>
        // 初始化数据
        const songList = [
            { name: "二宝子的楼兰", url: "https://files.catbox.moe/yejdad.flac" },
            { name: "富士山下", url: "https://files.catbox.moe/qgh684.flac" },
            { name: "好心好报", url: "https://files.catbox.moe/5b4cw2.flac" }
        ];

        const player = document.getElementById('main-player');
        const playlistElem = document.getElementById('playlist');
        const titleElem = document.getElementById('track-title');
        let currentTrackIndex = 0;

        // 1. 生成播放列表 UI
        function renderPlaylist() {
            playlistElem.innerHTML = '';
            songList.forEach((song, index) => {
                const item = document.createElement('div');
                item.className = `playlist-item ${index === currentTrackIndex ? 'active' : ''}`;
                item.innerHTML = `
                    <span class="song-name">${index + 1}. ${song.name}</span>
                    <span class="quality-tag">FLAC 无损</span>
                `;
                item.onclick = () => switchTrack(index);
                playlistElem.appendChild(item);
            });
        }

        // 2. 切歌功能
        function switchTrack(index) {
            currentTrackIndex = index;
            const song = songList[index];
            
            // 更新播放器源码和标题
            player.src = song.url;
            titleElem.innerText = song.name;
            
            // 更新 UI 状态
            renderPlaylist();
            
            // 播放
            player.play();
        }

        // 3. 自动播放下一曲
        player.onended = function() {
            let nextIndex = (currentTrackIndex + 1) % songList.length;
            switchTrack(nextIndex);
        };

        // 4. 搜索引擎功能 (处理回车)
        const searchInput = document.getElementById('music-search');
        searchInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && this.value.trim() !== "") {
                const keyword = encodeURIComponent(this.value.trim());
                // 酷我接口链接
                const searchUrl = `http://search.kuwo.cn/r.s?all=${keyword}&ft=music&itemset=web_2013&client=kt&pn=0&rn=20&rformat=json&encoding=utf8`;
                
                // 由于跨域限制，前端无法直接fetch该接口，这里采用跳转方式
                // 如果你有后端代理，可以在这里发起 fetch 请求
                alert('正在前往酷我搜索：' + this.value.trim() + '\n(注：由于接口跨域限制，将直接跳转至搜索结果页)');
                window.open(`https://www.kuwo.cn/search/list?key=${keyword}`, '_blank');
            }
        });

        // 5. 时间刷新功能
        function updateDateTime() {
            const now = new Date();
            const dateStr = now.getFullYear() + "年" + (now.getMonth() + 1) + "月" + now.getDate() + "日";
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0') + ":" + 
                            now.getSeconds().toString().padStart(2, '0');
            
            document.getElementById('date').innerText = dateStr;
            document.getElementById('time').innerText = timeStr;
        }

        // 初始化
        renderPlaylist();
        setInterval(updateDateTime, 1000);
        updateDateTime();
    </script>
</body>
</html>
