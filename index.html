<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternity</title>
    <style>
        :root {
            --main-pink: #ff9aff;
            --main-cyan: #00f0ff;
            --glass: rgba(255, 255, 255, 0.11);
            --border: rgba(255, 180, 255, 0.4);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: "Microsoft YaHei", system-ui, sans-serif; 
        }

        body {
            min-height: 100vh;
            color: white;
            background: #000;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 背景 */
        .bg-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://w.wallhaven.cc/full/85/wallhaven-85m7qy.jpg') no-repeat center center;
            background-size: cover;
            filter: blur(40px) brightness(0.60);
            z-index: -2;
            transform: scale(1.12);
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, 
                rgba(255, 140, 255, 0.25) 0%,
                rgba(0, 220, 255, 0.38) 50%,
                rgba(200, 120, 255, 0.22) 100%);
            z-index: -1;
        }

        /* 跑马灯 */
        .header-marquee {
            width: 100%;
            background: rgba(255, 150, 255, 0.22);
            backdrop-filter: blur(12px);
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            position: sticky; 
            top: 0; 
            z-index: 100;
        }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee-run 25s linear infinite;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 12px var(--main-pink);
            font-size: 1.1rem;
        }

        @keyframes marquee-run {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        .main-wrapper {
            flex: 1;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .glass-box {
            width: 100%;
            max-width: 630px;
            background: var(--glass);
            backdrop-filter: blur(22px);
            border: 1px solid var(--border);
            border-radius: 26px;
            padding: 35px 28px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(255, 120, 255, 0.28);
        }

        /* Eternity 主标题 */
        .eternity-title {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #ff9aff, #00f0ff, #ff9aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            text-shadow: 0 0 25px rgba(255, 150, 255, 0.5);
        }

        .player-title { 
            color: #fff; 
            font-size: 1.3rem; 
            margin: 10px 0 22px;
            opacity: 0.95;
        }

        /* 歌词区 */
        .lyric-container {
            height: 75px;
            overflow: hidden;
            margin-bottom: 22px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 200, 255, 0.25);
        }

        #lyric-text { 
            color: #fff; 
            font-size: 1.08rem; 
            text-shadow: 0 0 12px var(--main-cyan);
            padding: 0 25px;
        }

        audio {
            width: 100%;
            filter: invert(0.85) hue-rotate(310deg) brightness(1.2);
            margin-bottom: 28px;
        }

        .song-list {
            text-align: left;
            max-height: 290px;
            overflow-y: auto;
            background: rgba(0,0,0,0.18);
            border-radius: 16px;
            border: 1px solid rgba(255, 180, 255, 0.22);
        }

        .song-item {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            transition: 0.25s;
        }

        .song-item:hover { background: rgba(255, 150, 255, 0.18); }
        .song-item.active {
            border-left: 5px solid #ff9aff;
            background: rgba(255, 150, 255, 0.25);
            color: #ff9aff;
            font-weight: bold;
        }

        /* 底部时间 */
        .bottom-info {
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(14px);
            padding: 28px 20px;
            border-top: 1px solid var(--border);
        }

        .footer-grid {
            max-width: 820px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        .intro-section { flex: 2; min-width: 230px; padding-right: 30px; }
        .time-section { flex: 1; text-align: right; min-width: 190px; }

        #display-date { 
            font-size: 1.12rem; 
            opacity: 0.92; 
            margin-bottom: 8px; 
        }
