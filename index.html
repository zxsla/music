<!DOCTYPE html>
<html lang="zh-CN">

    <title>Eternity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Microsoft YaHei", sans-serif; }
        body {
            min-height: 100vh;
            color: white;
            background: #000;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        .bg-fixed {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://w.wallhaven.cc/full/85/wallhaven-85m7qy.jpg') center/cover no-repeat;
            filter: blur(38px) brightness(0.68);
            z-index: -2;
        }
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,140,255,0.28), rgba(0,220,255,0.35), rgba(180,100,255,0.25));
            z-index: -1;
        }
        .header-marquee {
            background: rgba(255,150,255,0.22);
            backdrop-filter: blur(10px);
            padding: 13px 0;
            text-align: center;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #ff9aff;
            position: sticky; top: 0; z-index: 10;
            font-size: 1.02rem;
        }
        .main {
            flex: 1;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .glass-box {
            background: rgba(255,255,255,0.10);
            backdrop-filter: blur(22px);
            border: 1px solid rgba(255,200,255,0.4);
            border-radius: 26px;
            padding: 32px 25px;
            text-align: center;
            max-width: 630px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(255,120,255,0.28);
        }
        .title {
            font-size: 2.35rem;
            font-weight: bold;
            letter-spacing: 6px;
            background: linear-gradient(90deg, #ff9aff, #00f0ff, #ff9aff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .subtitle {
            font-size: 1.12rem;
            margin-bottom: 25px;
            opacity: 0.92;
        }
        .lyric-container {
            height: 80px;
            background: rgba(0, 0, 0, 0.48);
            border: 2px solid rgba(255, 220, 255, 0.55);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            box-shadow: 0 0 18px rgba(0, 240, 255, 0.4);
        }
        #lyric-text {
            font-size: 1.18rem;
            font-weight: bold;
            padding: 0 25px;
            text-align: center;
            text-shadow: 0 0 12px #00f0ff, 0 0 25px #ff9aff;
            transition: opacity 0.5s ease;
            line-height: 1.45;
        }
        .song-lyric-box {
            min-height: 160px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 220, 255, 0.45);
            border-radius: 16px;
            padding: 18px 22px;
            margin-bottom: 25px;
            text-align: left;
            overflow-y: auto;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.35);
            line-height: 1.65;
            font-size: 1.05rem;
        }
        #song-lyric {
            opacity: 0.95;
            transition: all 0.6s ease;
        }
        .player-title {
            font-size: 1.28rem;
            margin: 10px 0 18px;
        }
        audio {
            width: 100%;
            margin-bottom: 22px;
        }
        .song-list {
            text-align: left;
            max-height: 380px;
            overflow-y: auto;
            background: rgba(0,0,0,0.22);
            border-radius: 14px;
            border: 1px solid rgba(255,180,255,0.2);
        }
        .song-item {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            cursor: pointer;
        }
        .song-item:hover, .song-item.active {
            background: rgba(255,150,255,0.28);
            color: #ff9aff;
        }
        .bottom-info {
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(12px);
            padding: 20px;
            text-align: center;
            border-top: 1px solid rgba(255,200,255,0.3);
        }
        #display-date {
            font-size: 1.15rem;
            margin-bottom: 6px;
            opacity: 0.95;
        }
        #display-time {
            font-size: 2.1rem;
            font-weight: bold;
            color: #00f0ff;
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.7);
        }
    </style>
</head>
<body>
    <div class="bg-fixed"></div>

        Eternity · 白嫖联盟永恒音乐空间
    </div>

    <div class="main">

            <div class="subtitle">白嫖联盟 · 永恒音乐空间</div>

            <div class="lyric-container">

            </div>

            <div class="song-lyric-box">
                <div id="song-lyric">点击歌曲开始播放，即可显示歌词</div>
            </div>

            <div class="player-title" id="track-name">正在载入歌曲...</div>
            <audio id="audio-player" controls></audio>

            <div class="song-list" id="list-render"></div>
        </div>
    </div>

    <div class="bottom-info">
        <div id="display-date"></div>
        <div id="display-time"></div>
    </div>
