<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>经典旋律 | 纯净音频空间</title>
    <style>
        :root {
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --tech-bg: #020b1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--tech-bg);
            overflow-x: hidden;
        }

        /* 背景：杨幂模糊40px */
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(2, 11, 26, 0.8), rgba(18, 0, 36, 0.8)),
                        url('https://w.wallhaven.cc/full/85/wallhaven-85m7qy.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(40px);
            z-index: -2;
            transform: scale(1.1);
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        /* 顶部跑马灯 */
        .marquee {
            width: 100%; background: rgba(0, 0, 0, 0.9);
            padding: 12px 0; border-bottom: 2px solid var(--neon-blue);
            position: fixed; top: 0; z-index: 100;
        }

        .marquee-text {
            display: inline-block; white-space: nowrap;
            animation: moveText 20s linear infinite;
            color: var(--neon-blue); font-weight: bold;
            letter-spacing: 2px;
        }

        @keyframes moveText { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* 主体面板 */
        .main-panel {
            margin: 100px 0 50px;
            width: 90%; max-width: 700px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px; padding: 30px;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            z-index: 10;
        }

        .header h1 {
            text-align: center;
            background: linear-gradient(to right, #00f3ff, #bc13fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        /* 播放器 */
        .player-status { color: var(--neon-blue); font-size: 14px; margin-bottom: 10px; text-align: center; }
        audio {
            width: 100%; height: 45px;
            filter: invert(1) hue-rotate(180deg) brightness(1.5);
            margin-bottom: 20px;
        }

        /* 列表区域 */
        .list-title { color: var(--neon-purple); border-bottom: 1px solid var(--neon-purple); padding-bottom: 5px; margin-bottom: 10px; font-size: 14px; }
        .song-item {
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; display: flex; justify-content: space-between;
            transition: 0.3s;
        }
        .song-item:hover { background: rgba(0, 243, 255, 0.1); }
        .song-item.active { border-left: 4px solid var(--neon-blue); background: rgba(0, 243, 255, 0.1); color: var(--neon-blue); }

        /* 底部 */
        footer {
            margin-top: auto; width: 100%; background: rgba(0, 0, 0, 0.95);
            padding: 25px; border-top: 1px solid var(--neon-blue);
        }
        .footer-content { max-width: 700px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-start; }
        .intro { flex: 2; font-size: 13px; color: #888; line-height: 1.6; }
        .clock { flex: 1; text-align: right; color: var(--neon-purple); font-weight: bold; }
    </style>
</head>
<body>

    <div class="bg-layer"></div>
    <div class="bg-grid"></div>

    <div class="marquee">
        <div class="marquee-text">
            🚀 欢迎访问「经典旋律」:: 音频轨道已就绪 :: 全部歌曲来自白嫖联盟无损仓库 :: 正在播放高清流媒体...
        </div>
    </div>

    <div class="main-panel">
        <div class="header">
            <h1>经典旋律</h1>
            <div class="player-status" id="status">准备就绪</div>
        </div>

        <audio id="audio" controls autoplay></audio>

        <div class="list-title">🎵 播放列表</div>
        <div id="playlist">
            <div class="song-item active" onclick="playIdx(0)"><span>1. 明年今日</span>
